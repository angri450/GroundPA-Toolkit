name: skill-manager CI

on:
  push:
    paths:
      - 'SKILL.md'
      - 'references/**'
      - 'workflows/**'
      - 'evals/**'
      - '.scan-allowlist.json'
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: skill-manager
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      - name: Install skill-manager
        run: dotnet tool install --global Angri450.Nong.Skill.Manager

      - name: Validate
        run: skill-manager validate .

      - name: Security scan
        run: skill-manager scan .

      - name: Allowlist audit
        run: skill-manager scan . --audit-allowlist

      - name: Eval schema check
        run: skill-manager eval evals/evals.json

      - name: Inventory
        run: skill-manager inventory .
